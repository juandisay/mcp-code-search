[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (includes F811 for redefinitions)
    "W",   # pycodestyle warnings
    "I",   # isort
    "C90", # mccabe
    "B",   # flake8-bugbear
]
ignore = []

[tool.ruff.lint.mccabe]
max-complexity = 15
